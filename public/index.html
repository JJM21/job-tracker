<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>

<style>
body { background:#f4f6f9; }
.container-box{
    max-width:900px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.08);
}
canvas{ border:2px solid #ccc; border-radius:6px; }
.job-card{ border:1px solid #ddd; padding:15px; border-radius:8px; margin-bottom:20px; }
.hidden{ display:none; }
.issue-stock{ margin-top:10px; }
.issue-stock select, .issue-stock input{ margin-bottom:5px; }
</style>
</head>
<body>

<div class="container">

<!-- LOGIN / REGISTER -->
<div id="authBox" class="container-box">
<h3 class="mb-3">Job System Login</h3>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">
<button onclick="login()" class="btn btn-primary w-100 mb-2">Login</button>

<hr>

<h5>Register</h5>
<input id="regEmail" class="form-control mb-2" placeholder="Email">
<input id="regPassword" type="password" class="form-control mb-2" placeholder="Password">
<select id="role" class="form-control mb-3">
  <option value="employee">Employee</option>
  <option value="admin">Admin / Employer</option>
  <option value="stock_manager">Stock Manager</option>
</select>
<button onclick="register()" class="btn btn-success w-100">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden container-box">
<div class="d-flex justify-content-between">
<h3>Dashboard</h3>
<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>

<hr>

<!-- Admin Panel -->
<div id="adminPanel" class="hidden">
<h4>Create Job</h4>
<input id="jobTitle" class="form-control mb-2" placeholder="Job Title">
<textarea id="jobDescription" class="form-control mb-2" placeholder="Job Description"></textarea>
<input id="assignTo" class="form-control mb-3" placeholder="Assign to Employee Email">
<button onclick="createJob()" class="btn btn-dark mb-4">Create Job</button>
</div>

<h4>Your Jobs</h4>
<div id="jobs"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let token = localStorage.getItem("token");
let role = localStorage.getItem("role");
const API = "";

// LOGIN
async function login(){
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  const data = await res.json();
  if(data.token){
    localStorage.setItem("token",data.token);
    localStorage.setItem("role",data.role);
    init();
  }else{ alert(data.error); }
}

// REGISTER
async function register(){
  const res = await fetch(API+"/register",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById("regEmail").value,
      password: document.getElementById("regPassword").value,
      role: document.getElementById("role").value
    })
  });
  const data = await res.json();
  alert(data.message || data.error);
}

// INIT
function init(){
  token = localStorage.getItem("token");
  role = localStorage.getItem("role");
  if(token){
    authBox.classList.add("hidden");
    dashboard.classList.remove("hidden");
    if(role==="admin"){ adminPanel.classList.remove("hidden"); }
    loadJobs();
  }
}
init();

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// CREATE JOB
async function createJob(){
  const res = await fetch(API+"/jobs",{
    method:"POST",
    headers:{'Content-Type':'application/json','Authorization':token},
    body:JSON.stringify({
      title:jobTitle.value,
      description:jobDescription.value,
      assignedEmail:assignTo.value
    })
  });
  const data = await res.json();
  alert(data.message || data.error);
  loadJobs();
}

// LOAD JOBS
async function loadJobs(){
  const res = await fetch(API+"/jobs",{headers:{'Authorization':token}});
  const jobs = await res.json();
  const jobsDiv = document.getElementById("jobs");
  jobsDiv.innerHTML="";
  jobs.forEach(job=>{
    let html = `<div class="job-card">
      <h5>${job.title}</h5>
      <p>${job.description}</p>
      <b>Status:</b> ${job.status}<br>
      <b>Notes:</b> ${job.notes || "None"}<br>
      ${job.image ? `<img src="/${job.image}" width="200" class="mt-2"/>` : ""}
      <hr>`;
    
    // Employee actions
    if(role==="employee"){
      html+=`
      <textarea id="note-${job.id}" class="form-control mb-2" placeholder="Add notes"></textarea>
      <input type="file" id="file-${job.id}" class="form-control mb-2">
      <button onclick="upload(${job.id})" class="btn btn-secondary btn-sm mb-2">Upload Image</button>
      <button onclick="addNote(${job.id})" class="btn btn-info btn-sm mb-2">Save Note</button>
      <h6>Customer Signature</h6>
      <canvas id="sig-${job.id}" width="300" height="120"></canvas>
      <button onclick="saveSignature(${job.id})" class="btn btn-warning btn-sm mt-2">Save Signature</button>
      <button onclick="completeJob(${job.id})" class="btn btn-success btn-sm mt-2">Complete Job</button>`;
    }

    // Stock Manager actions
    if(role==="stock_manager"){
      html+=`
      <div class="issue-stock">
        <h6>Issue Stock</h6>
        <select id="stockSelect-${job.id}"></select>
        <input type="number" id="stockQuantity-${job.id}" placeholder="Quantity" min="1" class="form-control mb-2">
        <button onclick="issueStock(${job.id})" class="btn btn-primary btn-sm mb-2">Issue Stock</button>
        <p id="stockMessage-${job.id}"></p>
        <h6>Issued Stock:</h6>
        <ul id="issuedStock-${job.id}"></ul>
      </div>`;
    }

    html+="</div>";
    jobsDiv.innerHTML+=html;

    if(role==="employee"){
      const canvas = document.getElementById(`sig-${job.id}`);
      if(canvas) new SignaturePad(canvas);
    }

    if(role==="stock_manager"){
      loadStock(job.id);
      loadIssuedStock(job.id);
    }
  });
}

// STOCK FUNCTIONS
async function loadStock(jobId){
  const res = await fetch("/stock",{headers:{'Authorization':token}});
  const stock = await res.json();
  const select = document.getElementById(`stockSelect-${jobId}`);
  select.innerHTML = `<option value="">Select Item</option>`;
  stock.forEach(item=>{
    const option = document.createElement("option");
    option.value = item.id;
    option.textContent = `${item.item_name} (${item.quantity} ${item.unit})`;
    select.appendChild(option);
  });
}

async function issueStock(jobId){
  const stockId = document.getElementById(`stockSelect-${jobId}`).value;
  const quantity = Number(document.getElementById(`stockQuantity-${jobId}`).value);
  const msgEl = document.getElementById(`stockMessage-${jobId}`);

  if(!stockId || !quantity){ msgEl.textContent="Select stock item and quantity"; return; }

  const res = await fetch(`/jobs/${jobId}/issue-stock`,{
    method:"POST",
    headers:{'Content-Type':'application/json','Authorization':token},
    body:JSON.stringify({stock_id:stockId, quantity})
  });
  const data = await res.json();
  msgEl.textContent = data.message || data.error;
  loadStock(jobId);
  loadIssuedStock(jobId);
}

async function loadIssuedStock(jobId){
  const res = await fetch(`/jobs/${jobId}/materials`,{
    headers:{'Authorization':token}
  });
  const materials = await res.json();
  const listEl = document.getElementById(`issuedStock-${jobId}`);
  listEl.innerHTML="";
  materials.forEach(m=>{
    const li = document.createElement("li");
    li.textContent = `${m.item_name} - ${m.quantity_used} ${m.unit}`;
    listEl.appendChild(li);
  });
}

// ADD NOTE
async function addNote(id){
  const note = document.getElementById(`note-${id}`).value;
  await fetch(`/jobs/${id}/note`,{
    method:"POST",
    headers:{'Content-Type':'application/json','Authorization':token},
    body:JSON.stringify({note})
  });
  loadJobs();
}

// UPLOAD IMAGE
async function upload(id){
  const fileInput = document.getElementById(`file-${id}`);
  const formData = new FormData();
  formData.append("image",fileInput.files[0]);
  await fetch(`/jobs/${id}/upload`,{method:"POST",headers:{'Authorization':token},body:formData});
  loadJobs();
}

// SAVE SIGNATURE
async function saveSignature(id){
  const canvas = document.getElementById(`sig-${id}`);
  const dataURL = canvas.toDataURL();
  await fetch(`/jobs/${id}/sign`,{
    method:"POST",
    headers:{'Content-Type':'application/json','Authorization':token},
    body:JSON.stringify({signature:dataURL})
  });
  alert("Signature saved");
}

// COMPLETE JOB
async function completeJob(id){
  const res = await fetch(`/jobs/${id}/complete`,{method:"PUT",headers:{'Authorization':token}});
  const data = await res.json();
  alert(data.message);
  loadJobs();
}

// SOCKET.IO
const socket = io();
socket.on("jobCreated", data=>{ alert("New job created: "+data.title); loadJobs(); });
socket.on("jobUpdated", ()=>loadJobs());
socket.on("jobCompleted", ()=>loadJobs());
</script>

</body>
</html>
